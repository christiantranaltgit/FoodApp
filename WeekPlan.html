<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset='utf-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>FoodApp</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Manufacturing+Consent&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">



        <link rel="stylesheet" href="WeekPlan.css">
    </head>

    <body>

    <header class="header">
    <a href="Recipes.html" class="recipes">Recipes</a></nav>
    <a href="MainPage.html" class="logoweekplan"><img src="Food_Logo.png"></img></a> 
    <i class="fa-solid fa-circle-plus" id="add-button"></i>
    <!-- <div id="save">Save Button</div> -->
    </header>
    <div class="Calendar">
         <div id="SUN">Sunday</div>
        <div id="M">Monday</div>
        <div id="T">Tuesday</div>
        <div id="W">Wednesday</div>
        <div id="TH">Thursday</div>
        <div id="F">Friday</div>
        <div id="SAT">Saturday</div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-inner" id="modal-inner" draggable="true">
            <span class="selectedmeal">Selected Meal</span>
            <select class="meals">
            </select>
            <div class="modal-images">
            <a href="https://mykoreankitchen.com/bibimbap-korean-mixed-rice-with-meat-and-assorted-vegetables" draggable="false"><img src="/Images/1.Korean-mixed-rice-Bibimbap.jpg" width="150" height="150" draggable="false"></a>
            </div>
            <select class="days"></select>
           <i class="bi bi-x-circle-fill" id="exit-button"></i>
           <i class="bi bi-check-circle-fill" id="check-button"></i>
           <i class="bi bi-trash3-fill"></i>
        </div>
        <!-- Highly likely we need to make a new div to make an edit interface -->
    </div>
    <script src='WeekPlan.js' defer></script>
    </body>
</html>
