    <body>

    <header class="header">
    <nav class="logo">
        <a href="index.html"><img src="Food_Logo.png" ></img></a> 
    </nav>
    <nav class="weekplan">
        <a href="WeekPlan.html">Week Plan</a>
    </nav>
        <i class="fa-solid fa-circle-plus" id="add-button"></i>
    </header>
      <div class="modal" id="modal">
         <form class="mealform">
            <h3>Meal/Recipe</h3>
            <input id="Meal-Name" name="Meal" type="text">
            <h3>Website/URL</h3>
            <input id="Site" name="URL" type="text">
            <h3>Meal Category</h3>
            <div class="imagedrop-outer">
            <input id="File" type="file" hidden>
           <i class="bi bi-file-earmark-plus-fill"></i>
            </div>
            <select id="Meal-Category" name="MealCategory" type="select">
            <option>High Protein</option>
            <option>Vegan</option>
            <option>Pescatarian</option>
            </select>
     <i class="bi bi-x-circle-fill" id="exit-button"></i>
        <button type="submit">
    <i class="bi bi-check-circle-fill" id="check-button"></i>
        </button>
         </form>
      </div>
      
      <div class="filter">
         <select id="CategoryFilter">
            <option>High Protein</option>
            <option>Vegan</option>
            <option>Pescatarian</option>
        </select>
      </div>
    <script src=Recipes.js></script>

</body>
